<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../MiExamen.css">
    <!--  La prueba tecnica consistió en resolver el siguiente enunciado: 
      "crea una función que reciba un número como parámetro de entrada y te devuelva un entero que 
    represente el número de círculos que contiene el parámetro de entrada (que es un numero, posiblemente de varias cifras)"  -->
</head>

<body>
    <div class="container">
        <div class="form-box">
            <h1>Contador de Círculos</h1>
            <div class="input-group">
                <input id="inpt1" type="number" placeholder="Introduce un número">
            </div>
            <button id="btnCalcular">Calcular Círculos</button>
            <div id="resultado" style="margin-top: 20px; font-weight: bold; color: #764ba2;"></div>
        </div>
    </div>

    <script>
        document.getElementById('btnCalcular').addEventListener('click', () => {
            const num = document.getElementById('inpt1').value;
            if (!num) return;

            // Mapa de círculos por cada dígito
            const circulosPorDigito = {
                '0': 1, '1': 0, '2': 0, '3': 0, '4': 1,
                '5': 0, '6': 1, '7': 0, '8': 2, '9': 1
            };
            
            // Convertimos a string y usamos reduce para sumar los círculos de forma eficiente
            const totalCirculos = num.toString().split('').reduce((acc, digito) => {
                return acc + (circulosPorDigito[digito] || 0);
            }, 0);
            
            document.getElementById('resultado').innerText = `Total de círculos: ${totalCirculos}`;
        });
    </script>
</body>
</html>
